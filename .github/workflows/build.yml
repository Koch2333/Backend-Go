name: Build

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
  workflow_dispatch:
  release:
    types: [created]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Build web SPA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install web deps
        working-directory: web
        run: pnpm install --no-frozen-lockfile

      - name: Build web SPA
        working-directory: web
        run: pnpm build

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: internal/adminui/dist
          if-no-files-found: error
          retention-days: 14

  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: web
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
            ext: '.exe'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: internal/adminui/dist

      - name: Resolve Go modules
        run: go mod tidy

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME//\//-}"
          COMMIT="${GITHUB_SHA::12}"
          BUILD="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          OUT="backend-go-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          mkdir -p dist
          go build -trimpath \
            -ldflags "-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.Build=${BUILD}" \
            -o "dist/${OUT}" ./cmd/server
          ( cd dist && sha256sum "${OUT}" > "${OUT}.sha256" )

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-go-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/backend-go-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
            dist/backend-go-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/backend-go-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
            dist/backend-go-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}.sha256
